def buildAsLibrary = project.hasProperty('BUILD_AS_LIBRARY')
def buildAsApplication = !buildAsLibrary
if (buildAsApplication) {
    apply plugin: 'com.android.application'
}
else {
    apply plugin: 'com.android.library'
}

android {
    namespace = "net.retropc.pi"
    ndkVersion = "23.2.8568313"
    compileSdk = 36

    defaultConfig {
        if (buildAsApplication) {
            applicationId = "net.retropc.pi"
        }
        minSdk = 19
        targetSdk = 35
        versionCode = 4
        versionName = "1.78"
        testInstrumentationRunner = 'androidx.test.runner.AndroidJUnitRunner'
        externalNativeBuild {
            ndkBuild {
                arguments "APP_PLATFORM=android-19"
                abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            }
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            storeFile = rootProject.file('release.keystore')
            storePassword = System.getenv('KEYSTORE_PASSWORD')
            keyAlias = System.getenv('KEY_ALIAS')
            keyPassword = System.getenv('KEY_PASSWORD')
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (rootProject.file('release.keystore').exists()) {
                signingConfig = signingConfigs.release
            }
        }
    }

    lint {
        abortOnError = true
    }

    if (!project.hasProperty('EXCLUDE_NATIVE_LIBS')) {
        sourceSets.main {
            jniLibs.srcDir 'libs'
        }
        externalNativeBuild {
            ndkBuild {
                path 'jni/Android.mk'
            }
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.documentfile:documentfile:1.0.1'
}

if (buildAsLibrary) {
    def copyDebugAar = tasks.register('copyDebugAar', Copy) {
        dependsOn 'bundleDebugAar'
        from layout.buildDirectory.file('outputs/aar/app-debug.aar')
        into layout.buildDirectory.dir('outputs/aar')
        rename { 'net.retropc.pi.aar' }
    }
    tasks.matching { it.name == 'assembleDebug' }.configureEach {
        finalizedBy copyDebugAar
    }
}
